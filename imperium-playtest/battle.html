<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Imperium – Battle</title>

  <!-- SOLO questi due -->
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/battle.css">
</head>

<body class="page-battle">

<header class="battlebar">
  <div class="battlebar__inner">
    <div class="battlebar__left">
      <h1 class="battlebar__title">Campo di Battaglia</h1>
      <div id="turnLine" class="battlebar__status">Turno — Fase</div>
      <a class="battlebar__back" href="index.html">Torna alla collezione</a>
    </div>

    <div class="battlebar__right">
      <button id="toCommandBtn" type="button" class="battlebar__btn battlebar__btn--ghost">Vai a COMMAND</button>
      <button id="endTurnBtn" type="button" class="battlebar__btn battlebar__btn--primary">Fine Turno</button>
          <div id="commandPips" class="commandPips" aria-label="Azioni Comando"></div>
    </div>
  </div>
</header>



  <!-- LOG DOCK (click per aprire/chiudere) -->
  <aside id="logDock" class="logDock is-closed" aria-expanded="false">
    <button id="logToggle" class="logDock__toggle" type="button">Log</button>
    <div class="logDock__panel">
      <div id="log" class="log log--scroll"></div>
    </div>
  </aside>


  <main class="container battle-wrap">

    <section id="battlefield">

      <!-- GIOCATORE (P0) -->
      <div class="player me">
        <div class="player__head">
          <h3 class="player__title">Giocatore</h3>

          <div class="zones" aria-label="Zone Giocatore">
            <div class="zone">
              <div class="zone__title">Mazzo</div>
              <div id="deckP0" class="zone__pile"></div>
            </div>
            <div class="zone">
              <div class="zone__title">Scarti</div>
              <div id="discardP0" class="zone__pile"></div>
            </div>
          </div>
        </div>

<div class="battleMeta battleMeta--me">
  <div class="gloriaBox">
    Gloria: <span id="gloriaP0">0</span>
  </div>

  <div class="cmdBox" aria-label="Azioni Comando Giocatore">
    <span class="cmdlabel">Comando</span>
    <span id="commandPipsP0" class="cmdpips" aria-hidden="true"></span>
  </div>
</div>
        <div class="pactumSide pactumSide--left" id="pactumP0" aria-label="Riserva (Pactum)">
          <div class="pactumSlot slot" data-owner="0" data-zone="pactum" data-idx="0"><div class="zoneHint">PACTUM</div></div>
          <div class="pactumSlot slot" data-owner="0" data-zone="pactum" data-idx="1"><div class="zoneHint">PACTUM</div></div>
        </div>


        <div class="rows">
          <div class="row back" id="playerBack">
            <div class="slot" data-owner="0" data-row="back" data-col="0"></div>
            <div class="slot" data-owner="0" data-row="back" data-col="1"></div>
            <div class="slot" data-owner="0" data-row="back" data-col="2"></div>
          </div>

          <div class="row front" id="playerFront">
            <div class="slot" data-owner="0" data-row="front" data-col="0"></div>
            <div class="slot" data-owner="0" data-row="front" data-col="1"></div>
            <div class="slot" data-owner="0" data-row="front" data-col="2"></div>
          </div>
        </div>

        <div class="handHead">
          <h3 class="handTitle">Mano</h3>
        </div>
        <div id="handP0" class="hand"></div>
      </div>


      <!-- AVVERSARIO (P1) -->
      <div class="player enemy">
        <div class="player__head">
          <h3 class="player__title">Avversario</h3>

          <div class="zones" aria-label="Zone Avversario">
            <div class="zone">
              <div class="zone__title">Mazzo</div>
              <div id="deckP1" class="zone__pile"></div>
            </div>
            <div class="zone">
              <div class="zone__title">Scarti</div>
              <div id="discardP1" class="zone__pile"></div>
            </div>
          </div>
        </div>

<div class="battleMeta battleMeta--enemy">
  <div class="gloriaBox">
    Gloria: <span id="gloriaP1">0</span>
  </div>

  <div class="cmdBox" aria-label="Azioni Comando Avversario">
    <span class="cmdlabel">Comando</span>
    <span id="commandPipsP1" class="cmdpips" aria-hidden="true"></span>
  </div>
</div>
        <div class="pactumSide pactumSide--right" id="pactumP1" aria-label="Riserva (Pactum)">
          <div class="pactumSlot slot" data-owner="1" data-zone="pactum" data-idx="0"><div class="zoneHint">PACTUM</div></div>
          <div class="pactumSlot slot" data-owner="1" data-zone="pactum" data-idx="1"><div class="zoneHint">PACTUM</div></div>
        </div>


        <div class="rows">
          <div class="row back" id="enemyBack">
            <div class="slot" data-owner="1" data-row="back" data-col="0"></div>
            <div class="slot" data-owner="1" data-row="back" data-col="1"></div>
            <div class="slot" data-owner="1" data-row="back" data-col="2"></div>
          </div>

          <div class="row front" id="enemyFront">
            <div class="slot" data-owner="1" data-row="front" data-col="0"></div>
            <div class="slot" data-owner="1" data-row="front" data-col="1"></div>
            <div class="slot" data-owner="1" data-row="front" data-col="2"></div>
          </div>
        </div>

        <div class="handHead">
          <h3 class="handTitle">Mano</h3>
          <span class="muted">(Avversario)</span>
        </div>
        <div id="handP1" class="hand hand--enemy"></div>
      </div>

    </section>

    <div id="cardPreview" class="card-preview" aria-hidden="true">
      <img id="cardPreviewImg" class="card-preview__img" alt="Preview carta">
    </div>
  </main>

  <script type="module" src="battle-deck.js"></script>
  <script type="module" src="battle.js"></script>

  <script type="module">
    const btn = document.getElementById("endTurnBtn");
    btn?.addEventListener("click", () => {
      window.dispatchEvent(new CustomEvent("BATTLE_END_TURN"));
    });
  </script>

  <div id="actionHud" class="hud" aria-hidden="true">
    <div class="hud__panel">
      <div class="hud__header">
        <div id="hudTitle" class="hud__title">Unità</div>
        <button id="hudClose" class="hud__close" type="button">×</button>
      </div>

      <div id="hudStats" class="hud__stats"></div>
      <div id="hudAbilities" class="hud__abilities"></div>
      <div id="hudPassives" class="hud__passives"></div>
    </div>
  </div>

  <!-- UI Prompt Modal (Scry/Choose) -->
<div id="uiPromptOverlay" class="uiprompt hidden" role="dialog" aria-modal="true">
  <div class="uiprompt__panel">
    <div class="uiprompt__title" id="uiPromptTitle">Scelta</div>

    <div class="uiprompt__card">
      <img id="uiPromptImg" alt="Carta" />
      <div class="uiprompt__name" id="uiPromptName"></div>
    </div>

    <div class="uiprompt__actions">
      <button id="uiPromptTopBtn" class="btn">Lascia sopra</button>
      <button id="uiPromptBottomBtn" class="btn btn--primary">Metti sotto</button>
    </div>
  </div>
</div>

  <div id="zoomOverlay" aria-hidden="true"><div class="zoomWrap"><div class="zoomCard"><img id="zoomImg" alt=""></div><div id="zoomInfo" class="zoomInfo" role="note" aria-label="Info carta"></div></div></div>
</body>
</html>
